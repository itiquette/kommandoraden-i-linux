extends: default

font:
  catalog:
    Atkinson Hyperlegible:
      normal: atkinson-hyperlegible-regular.ttf
      bold: atkinson-hyperlegible-bold.ttf
      italic: atkinson-hyperlegible-italic.ttf
      bold_italic: atkinson-hyperlegible-bold-italic.ttf
    Inconsolata:
      normal: Inconsolata-Regular.ttf
      bold: Inconsolata-Bold.ttf
      italic: Inconsolata-Regular.ttf
      bold_italic: Inconsolata-Bold.ttf

page:
  size: [7in, 9.25in]
  layout: portrait
  margin: [0.625in, 0.75in, 0.75in, 0.75in]
  numbering:
    start-at: 26

base:
  font-family: Atkinson Hyperlegible
  font-size: 10
  line-height-length: 1.35
  font-color: 222222

title-page:
  text-align: center
  font-family: Atkinson Hyperlegible
  title:
    top: 30%
    font-size: 28
    font-style: bold
    text-transform: uppercase
    letter-spacing: 0.1em
    line-height: 1.1
    margin-bottom: 14
  subtitle:
    font-size: 15
    font-style: normal
    margin-top: 10
    margin-bottom: 18
  authors:
    content: '{author}'
    font-size: 13
    font-style: normal
    line-height: 1.5
    margin-top: 0
    margin-bottom: 8
  revision:
    display: false

heading:
  font-family: Atkinson Hyperlegible
  font-style: bold
  font-color: 1a1a1a
  h1-font-size: 22
  h1-text-transform: uppercase
  h1-letter-spacing: 0.05em
  h1-margin-top: 0
  h1-margin-bottom: 12
  h2-font-size: 14
  h2-font-style: bold
  h2-margin-top: 18
  h2-margin-bottom: 8
  h3-font-size: 12
  h3-font-style: bold
  h3-margin-top: 14
  h3-margin-bottom: 6
  h4-font-size: 10.5
  h4-font-style: bold
  h4-margin-top: 10
  h4-margin-bottom: 4

header:
  height: 0

footer:
  font-family: Atkinson Hyperlegible
  height: 0.5in
  font-size: 8.5
  font-color: 555555
  border-width: 0.3
  border-color: cccccc
  recto:
    right:
      content: '{page-number}'
    left:
      content: '{chapter-title}'
  verso:
    left:
      content: '{page-number}'
    right:
      content: '{chapter-title}'

running-content:
  start-at: 28

code:
  font-family: Inconsolata
  font-size: 8.5
  background-color: f5f5f5
  border-color: dddddd
  border-width: 0.5
  border-radius: 2
  line-height: 1.25
  padding: [8, 10, 8, 10]

codespan:
  font-family: Inconsolata
  font-size: 9
  font-color: 333333
  background-color: f0f0f0

table:
  font-size: 8.5
  border-color: cccccc
  border-width: 0.5
  head:
    font-family: Atkinson Hyperlegible
    font-style: bold
    font-size: 9
    background-color: e8e8e8
  cell:
    padding: [4, 6, 4, 6]

caption:
  font-family: Atkinson Hyperlegible
  font-style: italic
  font-size: 8.5
  font-color: 555555

sidebar:
  background-color: f0f0f0
  border-color: cccccc
  border-width: 0.5
  border-radius: 2
  padding: [8, 10, 8, 10]

image:
  align: center

toc:
  font-family: Atkinson Hyperlegible
  font-size: 9
  indent: 16
  hanging-indent: 0
  line-height: 1.15
  h1-font-style: bold
  h1-font-size: 10
  h2-font-style: normal
  h2-font-size: 8.5
  h3-font-style: normal
  h3-font-size: 8
  dot-leader:
    content: "."
    font-color: 999999

role:
  small:
    font-size: 10
  frontmatter:
    font-size: 10
    line-height: 1.35
  latefront:
    font-size: 10
    line-height: 1.35

admonition:
  background-color: f5f5f5
  border-width: 0
  border-radius: 2
  padding: [8, 10, 8, 10]
  font-size: 9.5
  label:
    font-family: Atkinson Hyperlegible
    font-style: bold
    text-transform: uppercase
    font-size: 9
  icon:
    note:
      name: ~
    tip:
      name: ~
